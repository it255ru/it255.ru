# =============================================================================
# Конфигурация сайта Jekyll + Chirpy
# =============================================================================
# Документация темы: https://chirpy.cotes.page/
# Документация Jekyll: https://jekyllrb.com/docs/configuration/

# --- Тема ---
# Подключение темы Chirpy. Не менять, если используешь chirpy-starter.
theme: jekyll-theme-chirpy

# --- Язык ---
# Код языка сайта. Влияет на интерфейс (кнопки, даты, навигацию).
# Доступные локали лежат в _data/locales/ внутри гема темы.
# Полный список кодов: http://www.lingoes.net/en/translator/langcode.htm
# Для русского — "ru-RU", для английского — "en"
lang: ru-RU

# --- Часовой пояс ---
# Используется для корректного отображения дат в постах.
# Список зон: https://zones.arilyn.cc
# Примеры: Europe/Moscow, Asia/Yekaterinburg, Europe/Kaliningrad
timezone: Europe/Moscow

# =============================================================================
# SEO-настройки (используются плагином jekyll-seo-tag)
# Документация: https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# =============================================================================

# --- Заголовок сайта ---
# Отображается в шапке, вкладке браузера и поисковой выдаче.
title: Anton Eremin | it255.ru

# --- Подзаголовок ---
# Показывается под заголовком в сайдбаре.
tagline: DevSecOps & SRE

# --- Описание сайта ---
# Используется в мета-теге description и в RSS-ленте.
# Символ >- означает многострочную строку без переноса.
description: >-
  DevSecOps & SRE.

# --- URL сайта ---
# Протокол + домен БЕЗ завершающего слеша.
# Пример: https://username.github.io или https://example.com
url: "https://it255.ru"

# --- GitHub ---
# Имя пользователя GitHub. Используется для ссылок в подвале.
github:
  username: it255ru

# --- Twitter (необязательно) ---
# Если нет Twitter — закомментируй или удали секцию.
# twitter:
#   username: twitter_username

# --- Автор и контакты ---
# name — автор по умолчанию для постов и копирайт в подвале.
# email — для ссылки "написать автору".
# links — первая ссылка используется как ссылка копирайта.
social:
  name: Anton Eremin
  email: anton@it255.ru
  links:
    - https://github.com/it255ru
    # - https://twitter.com/username
    # - https://www.linkedin.com/in/username
    # - https://t.me/username

# =============================================================================
# Верификация в поисковиках (необязательно)
# =============================================================================
# Вставь коды верификации из соответствующих вебмастерок.
# Google: https://search.google.com/search-console
# Yandex: https://webmaster.yandex.ru
webmaster_verifications:
  google:   # код из Google Search Console
  bing:     # код из Bing Webmaster Tools
  alexa:    # код Alexa (сервис закрыт, можно не заполнять)
  yandex:   # код из Яндекс.Вебмастер
  baidu:    # код из Baidu Webmaster
  facebook: # код верификации Facebook

# =============================================================================
# Аналитика (необязательно)
# =============================================================================
# Подключи один или несколько сервисов аналитики.
# Google Analytics: https://analytics.google.com — создай ресурс, скопируй Measurement ID (G-XXXXXXX).
# GoatCounter: https://goatcounter.com — лёгкая альтернатива без cookies.
analytics:
  google:
    id:           # например: G-XXXXXXXXXX
  goatcounter:
    id:           # имя инстанса GoatCounter
  umami:
    id:           # ID сайта в Umami
    domain:       # домен Umami-сервера
  matomo:
    id:           # ID сайта в Matomo
    domain:       # домен Matomo-сервера
  cloudflare:
    id:           # токен Cloudflare Web Analytics
  fathom:
    id:           # Site ID в Fathom

# --- Просмотры страниц ---
# Показывает счётчик просмотров на постах. Пока поддерживается только GoatCounter.
pageviews:
  provider:       # goatcounter

# =============================================================================
# Внешний вид
# =============================================================================

# --- Цветовая схема ---
# Оставь пустым — будет переключатель светлой/тёмной темы в сайдбаре.
# Или зафиксируй: light / dark
theme_mode:       # [light | dark]

# --- CDN для медиа ---
# Если используешь CDN для картинок/видео — укажи базовый URL.
# Он будет добавлен ко всем путям медиаресурсов, начинающимся с '/'.
# Пример: https://cdn.example.com
cdn:

# --- Аватар ---
# Изображение в сайдбаре. Локальный путь или внешний URL.
# ВАЖНО: файл должен реально существовать в репозитории!
# Положи картинку в assets/img/avatar.jpg
avatar: /assets/img/avatar.jpg

# --- Превью для соцсетей ---
# Изображение для мета-тега og:image (при шеринге ссылки в соцсетях/мессенджерах).
# Можно переопределить в конкретном посте через page.image.
social_preview_image:   # путь к картинке или URL

# --- Оглавление ---
# Глобальный переключатель оглавления (Table of Contents) в постах.
# true — показывать, false — скрыть. Можно переопределить в посте: toc: false
toc: true

# =============================================================================
# Комментарии (необязательно)
# =============================================================================
# Выбери провайдер комментариев и заполни его настройки.
# disqus — классика, требует регистрации на disqus.com
# utterances — комменты через GitHub Issues
# giscus — комменты через GitHub Discussions (рекомендуется)
comments:
  provider:       # [disqus | utterances | giscus]

  disqus:
    shortname:    # короткое имя сайта в Disqus

  # Utterances: https://utteranc.es/
  utterances:
    repo:         # формат: username/repo
    issue_term:   # url | pathname | title

  # Giscus: https://giscus.app — заполни форму на сайте, скопируй значения.
  giscus:
    repo:              # формат: username/repo
    repo_id:           # из настроек giscus
    category:          # название категории Discussions
    category_id:       # ID категории
    mapping:           # pathname (по умолчанию)
    strict:            # 0 (по умолчанию)
    input_position:    # bottom (по умолчанию)
    lang:              # язык виджета, по умолчанию = site.lang
    reactions_enabled:  # 1 (по умолчанию)

# =============================================================================
# Статические ресурсы
# =============================================================================
# Для self-hosted версии статики (JS/CSS темы).
# Подробнее: https://github.com/cotes2020/chirpy-static-assets
# Обычно НЕ нужно включать — ресурсы подтягиваются из CDN.
assets:
  self_host:
    enabled:      # true/false, пустое = false
    env:          # [development | production], пустое = оба

# =============================================================================
# PWA (Progressive Web App)
# =============================================================================
# Позволяет "установить" сайт как приложение и кешировать для офлайн-доступа.
pwa:
  enabled: true          # true — сайт можно установить как PWA
  cache:
    enabled: true        # true — включить офлайн-кеш
    deny_paths:          # пути, исключённые из кеша
      # - "/example"     # URL вида <SITE_URL>/example/* не будут кешироваться

# =============================================================================
# Пагинация
# =============================================================================
# Количество постов на главной странице.
paginate: 10

# --- Базовый путь ---
# Если сайт в подпапке (например, username.github.io/blog), укажи: /blog
# Для корневого домена оставь пустым.
baseurl: ""

# =============================================================================
# Ниже — технические настройки. Менять НЕ рекомендуется.
# =============================================================================

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
